<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>福建中医药大学教务处公示</title>
  <style>
    :root {
      --brand: #a31135;
      --brand-dark: #7f0223;
      --brand-soft: #f8edf1;
      --brand-tint: #fff4f7;
      --paper: #ffffff;
      --ink: #181818;
      --muted: #6d6d6d;
      --line: #ebdbe0;
      --success: #247b50;
      --warning: #a05c0b;
      --danger: #b02a37;
      --shadow: 0 20px 40px rgba(100, 16, 38, 0.14);
      --shell-width: 460px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(163, 17, 53, 0.1), transparent 26%),
        linear-gradient(180deg, #fbf7f8, #f4eef1);
    }

    body {
      padding: 18px 12px 30px;
    }

    button,
    input,
    a {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .phone {
      width: min(100%, var(--shell-width));
      margin: 0 auto;
      background: var(--paper);
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
      min-height: calc(100vh - 36px);
      position: relative;
    }

    .status-bar {
      height: 32px;
      background: var(--brand);
    }

    .hero {
      padding: 22px 20px 24px;
      color: #fff;
      background:
        radial-gradient(circle at 100% 0, rgba(255, 255, 255, 0.18), transparent 25%),
        linear-gradient(135deg, #b21743, #8c0527 60%, #71011f);
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      letter-spacing: 1px;
      opacity: 0.92;
    }

    .brand-mark {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ffd4df;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12);
      flex: none;
    }

    .hero-title {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0 0 10px;
    }

    .hero-desc {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.86);
      margin: 0;
    }

    .hero-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .action-btn,
    .secondary-link {
      border: 0;
      border-radius: 999px;
      min-height: 42px;
      padding: 10px 14px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .action-btn {
      background: #fff;
      color: var(--brand);
      font-weight: 700;
    }

    .secondary-link {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    .module {
      margin: -14px 14px 18px;
      background: var(--paper);
      border-radius: 24px 24px 0 0;
      position: relative;
      z-index: 1;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px 16px 10px;
    }

    .stat-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      background: linear-gradient(180deg, #fff, #fdf9fa);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #1f1f1f;
      word-break: break-word;
      line-height: 1.45;
    }

    .module-head {
      padding: 12px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .module-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .module-title::before {
      content: "";
      width: 6px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, #bf1745, #8d0327);
    }

    .module-count {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .toolbar {
      padding: 14px 16px 8px;
      display: grid;
      gap: 10px;
    }

    .search-box {
      display: block;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 11px 14px;
      background: #fff;
    }

    .search-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .search-input {
      width: 100%;
      border: 0;
      outline: none;
      padding: 0;
      background: transparent;
      color: #1f1f1f;
      font-size: 15px;
    }

    .status-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pill {
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand);
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.45;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .pill strong {
      font-size: 12px;
      color: inherit;
    }

    .pill.is-success {
      background: #edf8f2;
      color: var(--success);
    }

    .pill.is-warning {
      background: #fff6ea;
      color: var(--warning);
    }

    .pill.is-danger {
      background: #fdeef0;
      color: var(--danger);
    }

    .notice-list {
      padding: 6px 16px 6px;
    }

    .notice-item {
      width: 100%;
      border: 0;
      background: none;
      text-align: left;
      padding: 14px 2px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      border-radius: 16px;
    }

    .notice-item:last-child {
      border-bottom: 0;
    }

    .notice-item[data-active="1"] {
      background: var(--brand-tint);
      padding-left: 10px;
      padding-right: 10px;
    }

    .notice-item.is-hidden {
      display: none;
    }

    .notice-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #cb2951;
      margin-top: 8px;
      flex: none;
      box-shadow: 0 0 0 4px rgba(203, 41, 81, 0.08);
    }

    .notice-main {
      flex: 1;
      min-width: 0;
    }

    .notice-title {
      display: block;
      font-size: 16px;
      line-height: 1.65;
      color: #1f1f1f;
      margin-bottom: 6px;
    }

    .notice-date {
      display: block;
      font-size: 12px;
      color: var(--brand);
      letter-spacing: 0.3px;
    }

    .empty-filter {
      margin: 6px 16px 0;
      border-radius: 16px;
      background: #faf7f8;
      color: var(--muted);
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.7;
      display: none;
    }

    .load-more-wrap {
      padding: 12px 16px 12px;
    }

    .load-more-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 700;
      cursor: pointer;
    }

    .load-more-btn[disabled] {
      opacity: 0.55;
      cursor: default;
    }

    .list-status {
      padding: 0 18px 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .detail-sheet {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 30;
    }

    .detail-sheet.is-open {
      display: block;
    }

    .sheet-mask {
      position: absolute;
      inset: 0;
      background: rgba(46, 16, 25, 0.54);
      backdrop-filter: blur(4px);
    }

    .sheet-body {
      position: absolute;
      inset: auto 0 0;
      max-height: 88vh;
      background: #fff;
      border-radius: 28px 28px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -16px 36px rgba(58, 16, 27, 0.18);
    }

    .sheet-bar {
      width: 56px;
      height: 6px;
      border-radius: 999px;
      background: #e6d6db;
      margin: 10px auto 4px;
      flex: none;
    }

    .sheet-head {
      padding: 10px 16px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      flex: none;
    }

    .sheet-title {
      font-size: 17px;
      font-weight: 700;
    }

    .sheet-close {
      border: 0;
      background: var(--brand-soft);
      color: var(--brand);
      width: 36px;
      height: 36px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 18px;
    }

    .sheet-content {
      overflow: auto;
      padding: 16px 18px 28px;
      -webkit-overflow-scrolling: touch;
    }

    .article-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.5;
      text-align: center;
      color: #131313;
    }

    .article-meta {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #ece2e6;
      font-size: 13px;
      color: #7a7a7a;
      text-align: center;
      line-height: 1.8;
    }

    .article-meta a {
      color: var(--brand);
      text-decoration: underline;
    }

    .article-content {
      margin-top: 18px;
      color: #333;
      font-size: 16px;
      line-height: 2;
      word-break: break-word;
    }

    .article-content p {
      margin: 0 0 14px;
    }

    .article-content img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 16px auto;
      border-radius: 10px;
    }

    .article-content table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      margin: 16px 0;
    }

    .article-content td,
    .article-content th {
      border: 1px solid #e2d7db;
      padding: 8px 10px;
      font-size: 14px;
    }

    .article-content a {
      color: var(--brand);
      text-decoration: underline;
      pointer-events: auto;
      cursor: pointer;
    }

    .detail-status {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
      padding: 22px 8px;
    }

    .back-top {
      position: fixed;
      right: 22px;
      bottom: 24px;
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 12px 24px rgba(104, 11, 36, 0.26);
      cursor: pointer;
      display: none;
      z-index: 40;
    }

    .back-top.is-visible {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    @media (min-width: 768px) {
      body {
        padding: 24px 0 40px;
      }

      .phone {
        min-height: 860px;
      }

      .detail-sheet {
        display: block;
        position: static;
        inset: auto;
        margin: 0 14px 18px;
      }

      .sheet-mask {
        display: none;
      }

      .sheet-body {
        position: static;
        max-height: none;
        border-radius: 24px;
        box-shadow: none;
        border: 1px solid var(--line);
      }

      .sheet-bar,
      .sheet-close {
        display: none;
      }

      .sheet-head {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar"></div>

    <section class="hero">
      <div class="hero-top">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>福建中医药大学教务处</span>
        </div>
      </div>
      <h1 class="hero-title">公示查看器</h1>
      <p class="hero-desc">
        保留手机端浏览体验，同时补上同步状态、关键词筛选、原站入口和详情同步时间，方便日常快速查看。
      </p>
      <div class="hero-actions">
        <button id="refreshBtn" class="action-btn" type="button">立即刷新</button>
        <a class="secondary-link" href="https://jwc.fjtcm.edu.cn/955/list.htm" target="_blank" rel="noopener noreferrer">打开学校原站</a>
      </div>
    </section>

    <main class="module">
      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">已加载 / 总记录</div>
          <div id="statCount" class="stat-value">0 / 0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">当前筛选显示</div>
          <div id="visibleCount" class="stat-value">0 条</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最新列表同步</div>
          <div id="listSyncTime" class="stat-value">未同步</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最新详情同步</div>
          <div id="detailSyncTime" class="stat-value">未同步</div>
        </div>
      </section>

      <div class="module-head">
        <div class="module-title">公告列表</div>
        <div id="moduleCount" class="module-count">正在加载...</div>
      </div>

      <section class="toolbar">
        <label class="search-box">
          <span class="search-label">关键词筛选</span>
          <input id="keywordInput" class="search-input" type="text" placeholder="输入标题或日期，筛选当前已加载内容">
        </label>
        <div class="status-row">
          <div id="listBadge" class="pill is-warning">
            <span>列表状态</span>
            <strong>等待同步</strong>
          </div>
          <div id="detailBadge" class="pill is-warning">
            <span>详情状态</span>
            <strong>等待选择</strong>
          </div>
        </div>
      </section>

      <div id="noticeList" class="notice-list"></div>
      <div id="emptyFilter" class="empty-filter">当前筛选条件下没有匹配的公告，可以换个关键词试试。</div>

      <div class="load-more-wrap">
        <button id="loadMoreBtn" class="load-more-btn" type="button">查看更多</button>
      </div>

      <div id="listStatus" class="list-status">页面会通过本地 HTTP 服务提供公示数据，适合手机浏览。</div>
    </main>

    <section id="detailSheet" class="detail-sheet" aria-hidden="true">
      <div class="sheet-mask" id="sheetMask"></div>
      <div class="sheet-body">
        <div class="sheet-bar"></div>
        <div class="sheet-head">
          <div class="sheet-title">公告详情</div>
          <button id="closeDetailBtn" class="sheet-close" type="button" aria-label="关闭详情">×</button>
        </div>
        <div id="sheetContent" class="sheet-content">
          <div class="detail-status">点开任意标题后，详情会在这里实时抓取。</div>
        </div>
      </div>
    </section>
  </div>

  <button id="backTopBtn" class="back-top" type="button" aria-label="返回顶部">↑</button>

  <script>
    const PAGE_SIZE = 6;
    const noticeList = document.getElementById("noticeList");
    const loadMoreBtn = document.getElementById("loadMoreBtn");
    const listStatus = document.getElementById("listStatus");
    const moduleCount = document.getElementById("moduleCount");
    const refreshBtn = document.getElementById("refreshBtn");
    const detailSheet = document.getElementById("detailSheet");
    const sheetContent = document.getElementById("sheetContent");
    const closeDetailBtn = document.getElementById("closeDetailBtn");
    const sheetMask = document.getElementById("sheetMask");
    const keywordInput = document.getElementById("keywordInput");
    const listBadge = document.getElementById("listBadge");
    const detailBadge = document.getElementById("detailBadge");
    const statCount = document.getElementById("statCount");
    const visibleCount = document.getElementById("visibleCount");
    const listSyncTime = document.getElementById("listSyncTime");
    const detailSyncTime = document.getElementById("detailSyncTime");
    const emptyFilter = document.getElementById("emptyFilter");
    const backTopBtn = document.getElementById("backTopBtn");

    let notices = [];
    let nextOffset = 0;
    let hasMore = true;
    let loadingList = false;
    let activeId = null;
    let totalCount = 0;

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, function (char) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        }[char];
      });
    }

    function formatTime(timestamp) {
      if (!timestamp) {
        return "未同步";
      }
      return new Date(timestamp * 1000).toLocaleString("zh-CN", { hour12: false });
    }

    function setBadge(element, status, text) {
      element.className = "pill";
      if (status === "success") {
        element.classList.add("is-success");
      } else if (status === "danger") {
        element.classList.add("is-danger");
      } else {
        element.classList.add("is-warning");
      }
      element.querySelector("strong").textContent = text;
    }

    function updateCounters() {
      statCount.textContent = notices.length + " / " + (totalCount || notices.length);
      const visible = noticeList.querySelectorAll(".notice-item:not(.is-hidden)").length;
      visibleCount.textContent = visible + " 条";
      emptyFilter.style.display = notices.length > 0 && visible === 0 ? "block" : "none";
    }

    function renderList() {
      noticeList.innerHTML = notices.map(function (item) {
        const active = String(item.id) === String(activeId) ? " data-active=\"1\"" : "";
        return `
          <button class="notice-item" type="button" data-id="${escapeHtml(item.id)}" data-title="${escapeHtml((item.title || "").toLowerCase())}" data-date="${escapeHtml((item.date || "").toLowerCase())}"${active}>
            <span class="notice-dot"></span>
            <span class="notice-main">
              <span class="notice-title">${escapeHtml(item.title)}</span>
              <span class="notice-date">${escapeHtml(item.date || "暂无日期")}</span>
            </span>
          </button>
        `;
      }).join("");
      filterList();
    }

    function updateListMeta() {
      moduleCount.textContent = "已加载 " + notices.length + (totalCount ? " / " + totalCount : "") + " 条";
      loadMoreBtn.style.display = hasMore ? "block" : "none";
      loadMoreBtn.disabled = loadingList;
      loadMoreBtn.textContent = loadingList ? "加载中..." : "查看更多";
      updateCounters();
    }

    function openDetailShell() {
      detailSheet.classList.add("is-open");
      detailSheet.setAttribute("aria-hidden", "false");
      if (window.innerWidth < 768) {
        document.body.style.overflow = "hidden";
      }
    }

    function closeDetailShell() {
      if (window.innerWidth < 768) {
        detailSheet.classList.remove("is-open");
        detailSheet.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }
    }

    function renderDetail(detail) {
      const metaParts = [];
      metaParts.push("<div>发布时间：" + escapeHtml(detail.date || "未知") + "</div>");
      metaParts.push("<div>来源：" + escapeHtml(detail.source || "教务处") + "</div>");
      if (detail.source_url) {
        metaParts.push("<div><a href=\"" + escapeHtml(detail.source_url) + "\" target=\"_blank\" rel=\"noopener noreferrer\">查看原文</a></div>");
      }

      sheetContent.innerHTML = `
        <h2 class="article-title">${escapeHtml(detail.title || "未命名公告")}</h2>
        <div class="article-meta">${metaParts.join("")}</div>
        <div class="article-content">${detail.content_html || "<p>暂无正文。</p>"}</div>
      `;
    }

    function filterList() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const items = noticeList.querySelectorAll(".notice-item");
      items.forEach(function (button) {
        const title = button.dataset.title || "";
        const date = button.dataset.date || "";
        const matched = !keyword || title.includes(keyword) || date.includes(keyword);
        button.classList.toggle("is-hidden", !matched);
      });
      updateCounters();
    }

    async function loadNotices(options) {
      const refresh = Boolean(options && options.refresh);
      if (loadingList) {
        return;
      }

      loadingList = true;
      if (refresh) {
        notices = [];
        nextOffset = 0;
        hasMore = true;
        totalCount = 0;
        keywordInput.value = "";
        renderList();
      }
      updateListMeta();
      setBadge(listBadge, "warning", refresh ? "正在刷新" : "正在加载");
      listStatus.textContent = refresh ? "正在刷新公告列表..." : "正在加载更多公告...";

      try {
        const query = new URLSearchParams({
          offset: String(nextOffset),
          limit: String(PAGE_SIZE),
          refresh: refresh ? "1" : "0"
        });
        const response = await fetch("/api/notices?" + query.toString(), {
          cache: "no-store"
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "公告加载失败");
        }

        notices = refresh ? (data.items || []) : notices.concat(data.items || []);
        nextOffset = data.next_offset || notices.length;
        hasMore = Boolean(data.has_more);
        totalCount = Number(data.total_count || notices.length);
        listSyncTime.textContent = formatTime(data.fetched_at);
        renderList();
        updateListMeta();
        setBadge(listBadge, "success", "已同步");
        listStatus.textContent = hasMore
          ? "已同步最新内容，可继续点击“查看更多”加载剩余公告。"
          : "公告标题已经全部加载完成。";
      } catch (error) {
        setBadge(listBadge, "danger", "同步失败");
        listStatus.textContent = "公告加载失败：" + error.message;
        loadMoreBtn.style.display = notices.length > 0 && hasMore ? "block" : "none";
      } finally {
        loadingList = false;
        updateListMeta();
      }
    }

    async function loadArticle(id) {
      activeId = id;
      renderList();
      openDetailShell();
      setBadge(detailBadge, "warning", "正在抓取");
      sheetContent.innerHTML = '<div class="detail-status">正在抓取这篇公告的正文，请稍候...</div>';

      try {
        const response = await fetch("/api/article?id=" + encodeURIComponent(id), {
          cache: "no-store"
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "详情加载失败");
        }
        detailSyncTime.textContent = formatTime(data.fetched_at);
        setBadge(detailBadge, "success", "已同步");
        renderDetail(data);
      } catch (error) {
        setBadge(detailBadge, "danger", "抓取失败");
        sheetContent.innerHTML = '<div class="detail-status">详情加载失败：' + escapeHtml(error.message) + "</div>";
      }
    }

    noticeList.addEventListener("click", function (event) {
      const button = event.target.closest(".notice-item");
      if (!button) {
        return;
      }
      loadArticle(button.dataset.id);
    });

    loadMoreBtn.addEventListener("click", function () {
      loadNotices({ refresh: false });
    });

    refreshBtn.addEventListener("click", function () {
      activeId = null;
      detailSyncTime.textContent = "未同步";
      setBadge(detailBadge, "warning", "等待选择");
      sheetContent.innerHTML = '<div class="detail-status">列表已刷新，重新点击任意一条公告即可查看详情。</div>';
      loadNotices({ refresh: true });
      if (window.innerWidth < 768) {
        closeDetailShell();
      }
    });

    keywordInput.addEventListener("input", filterList);
    closeDetailBtn.addEventListener("click", closeDetailShell);
    sheetMask.addEventListener("click", closeDetailShell);

    backTopBtn.addEventListener("click", function () {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    window.addEventListener("scroll", function () {
      backTopBtn.classList.toggle("is-visible", window.scrollY > 260);
    });

    window.addEventListener("resize", function () {
      if (window.innerWidth >= 768) {
        detailSheet.classList.add("is-open");
        detailSheet.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "";
      } else if (activeId === null) {
        closeDetailShell();
      }
    });

    if (window.innerWidth >= 768) {
      detailSheet.classList.add("is-open");
      detailSheet.setAttribute("aria-hidden", "false");
    }

    loadNotices({ refresh: true });
  </script>
</body>
</html>
